<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Forgot Password - SERS</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="box">

    <h2>🔑 Reset Password</h2>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Enter Registered Email"
            required>

        <input
            type="password"
            name="password"
            placeholder="Enter New Password"
            required>

        <button type="submit">
            Update Password
        </button>

    </form>

    <p>
        <a href="/login">
            ← Back to Login
        </a>
    </p>

</div>

</body>

</html>
