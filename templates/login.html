<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SERS</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0d47a1,#42a5f5);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            width:380px;
            background:#fff;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,.3);
        }

        .logo{
            text-align:center;
            font-size:45px;
            margin-bottom:10px;
        }

        .login-box h2{
            text-align:center;
            color:#0d47a1;
            margin-bottom:20px;
        }

        /* Flash Message */
        .flash{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border-radius:8px;
            text-align:center;
            font-weight:bold;
            font-size:15px;
        }

        .success{
            background:#d4edda;
            color:#155724;
            border:1px solid #c3e6cb;
        }

        .danger{
            background:#f8d7da;
            color:#721c24;
            border:1px solid #f5c6cb;
        }

        .warning{
            background:#fff3cd;
            color:#856404;
            border:1px solid #ffeeba;
        }

        .info{
            background:#d1ecf1;
            color:#0c5460;
            border:1px solid #bee5eb;
        }

        label{
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:6px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:15px;
        }

        input:focus{
            border-color:#1565c0;
            outline:none;
            box-shadow:0 0 6px rgba(21,101,192,.4);
        }

        button{
            width:100%;
            padding:12px;
            background:#0d47a1;
            color:white;
            border:none;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#1565c0;
        }

        p{
            text-align:center;
            margin-top:15px;
        }

        a{
            color:#0d47a1;
            text-decoration:none;
            font-weight:bold;
        }

        a:hover{
            text-decoration:underline;
        }

    </style>

</head>

<body>

<div class="login-box">

    <div class="logo">🚑</div>

    <h2>SERS Login</h2>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="/login" method="POST">

        <label>Email</label>
        <input type="email" name="email" placeholder="Enter Email" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>

    </form>

    <p>
        <a href="/forgot_password">Forgot Password?</a>
    </p>

    <p>
        Don't have an account?
        <a href="/register">Register</a>
    </p>

</div>

</body>
</html>
