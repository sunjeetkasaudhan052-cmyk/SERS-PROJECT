<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registered Users | SERS</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#2563eb);
padding:40px;
}

.container{
max-width:1200px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
flex-wrap:wrap;
gap:15px;
}

.header h1{
color:#1e3a8a;
}

.search-box input{
padding:10px 15px;
width:250px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
outline:none;
}

.search-box input:focus{
border-color:#2563eb;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

thead{
background:#1e3a8a;
color:white;
}

th,td{
padding:15px;
text-align:center;
}

tbody tr:nth-child(even){
background:#f8fafc;
}

tbody tr:hover{
background:#dbeafe;
transition:.3s;
}

th{
font-size:17px;
}

td{
font-size:15px;
}

.total-users{
background:#2563eb;
color:white;
padding:10px 18px;
border-radius:8px;
font-weight:bold;
}

.action-btn{
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
font-size:14px;
margin:2px;
}

.view-btn{
background:#2563eb;
}

.delete-btn{
background:#dc2626;
}

.view-btn:hover{
background:#1d4ed8;
}

.delete-btn:hover{
background:#b91c1c;
}

@media(max-width:768px){

.header{
flex-direction:column;
align-items:flex-start;
}

.search-box input{
width:100%;
}

.container{
padding:15px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>👥 Registered Users</h1>

<div class="total-users">
Total Users : {{ users|length }}
</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search User...">
</div>

</div>

<table id="userTable">

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Action</th>
</tr>

</thead>

<tbody>

{% for user in users %}

<tr>

<td>{{ user[0] }}</td>

<td>{{ user[1] }}</td>

<td>{{ user[2] }}</td>

<td>

<button class="action-btn view-btn">View</button>

<button class="action-btn delete-btn">Delete</button>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

<script>

const searchInput=document.getElementById("searchInput");

searchInput.addEventListener("keyup",function(){

let filter=this.value.toLowerCase();

let rows=document.querySelectorAll("#userTable tbody tr");

rows.forEach(function(row){

let text=row.innerText.toLowerCase();

row.style.display=text.includes(filter)?"":"none";

});

});

</script>

</body>
</html>
